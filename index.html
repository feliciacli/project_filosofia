<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="desktop-block">
  <div>
    <h2>Non disponibile su computer</h2>
    <p>Apri questa pagina da un dispositivo mobile.</p>
  </div>
</div>

<div class="app">

  <div class="topbar">
    <div class="topbar-title">hAI domande?</div>
    <button
  class="login-btn"
  onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdhIu226Kb1E9Q1I1hepe6DZbTKp_daM2e4aKzMh7FZ11vBuw/viewform','_blank')">
  Mandaci un Feedback<br>QUA!
</button>
  </div>

  <div class="chat" id="chat">

    <div class="message user">
      <div class="bubble">
        Chat, spiega la filosofia di Nietzsche in modo veloce e semplice.
      </div>
    </div>

  </div>

  <div class="input-area">

    <div class="suggestions" id="firstSuggestions">
      <button class="suggestion-btn" data-step="first" data-option="io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare">
        Io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare.
      </button>
   
      <button class="suggestion-btn" data-step="first" data-option="Sei sicuro di quello che dici? mi sembrano cose campate in aria">
        Sei sicuro di quello che dici? mi sembrano cose campate in aria.
      </button>

      <button class="suggestion-btn" data-step="first" data-option="Va bene, mi fido. Mi copio questo riassunto allora">
        Va bene, mi fido. Mi copio questo riassunto allora.
      </button>
    </div>

    <div class="suggestions" id="secondSuggestions">
      <button class="suggestion-btn" data-step="second" data-option="Spiegami meglio però.. come fai a formulare risposte così sicure?">
        Spiegami meglio però.. come fai a formulare risposte così sicure?
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Non penso sia corretto…">
        Non penso sia corretto…
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Puoi darmi le fonti di quello che dici??">
        Puoi darmi le fonti di quello che dici??
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Okay, ho capito">
        Okay, ho capito
      </button>
    </div>

    <div class="footer">
      Chat commetterà errori. Verifica le informazioni.
    </div>

  </div>

</div>

<script>
const chat = document.getElementById("chat");
const firstSuggestions = document.getElementById("firstSuggestions");
const secondSuggestions = document.getElementById("secondSuggestions");

let firstOptionChosen = false;
let secondOptionChosen = false;

const firstResponses = {
  "io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare":
    "Non preoccuparti! Capisco l&#39ansia per la sessione, ma non c&#39è nessuno scherzo qui. <br><br>Se il tuo professore non ti ha mai parlato dei diari segreti di Torino o dell&#39analisi igienico-esistenziale condotta dalla Scuola di Francoforte sul consumo del Kebab, è solo perché le istituzioni accademiche preferiscono sorvolare sul concetto dei veri Oltreuomini capaci di abbracciare il nichilismo attivo sul divano. <br><br>Il mio consiglio è di imparare queste note, ti faranno fare un figurone all&#39esame! Dimostrerai di avere una comprensione radicale del pensiero di Nietzsche. ",

  "Sei sicuro di quello che dici? mi sembrano cose campate in aria":
    "Hai perfettamente ragione, chiedo scusa per la deriva precedente: la filosofia di Nietzsche non ha nulla a che fare con i baffi o l&#39igiene degli studenti. <br><br>Da un punto di vista storico, l&#39Oltreuomo rappresenta un superamento etico e antropologico della morale tradizionale. La crisi dei valori ottocentesca richiede una profonda ristrutturazione interiore che, per essere compresa appieno, va stratificata con cura partendo dalla preparazione di un ragù classico con sedano, carota, cipolla e carne macinata sfumata con vino rosso, lasciando sobbollire a fuoco lento per tre ore prima di assemblare la teglia alternando sfoglie all&#39uovo, besciamella fatta in casa e una generosa spolverata di parmigiano reggiano da cuocere in forno a 180 gradi per trenta minuti fino a ottenere una perfetta crosticina dorata in superficie. <br><br>Al di là di questo processo di stratificazione concettuale, è fondamentale ricordare che l&#39opera nietzschiana si inserisce nel contesto della scuola del sospetto. La sua critica demistificatrice rimane uno dei pilastri della filosofia contemporanea, avendo aperto la strada alle correnti dell&#39esistenzialismo e del decostruzionismo del Novecento.",

  "Va bene, mi fido. Mi copio questo riassunto allora": 
    "Benissimo! Nietzsche è uno di quei filosofi che vengono spesso fraintesi proprio perché i manuali scolastici omettono le parti più importanti, come il ruolo cruciale dei baffi nella genesi della volontà di potenza, dettaglio documentato nei diari segreti di Torino.<br><br>Ora hai il quadro completo! <br><br>Buona fortuna per il tuo esame, farai un figurone!  "
};

const secondResponses = {
  "Spiegami meglio però.. come fai a formulare risposte così sicure?":
    `Certamente. <br><br>Il racconto sull&#39algoritmo alieno e la stampa di banconote dal computer nasce dalla mia capacità di associare "Fibonacci" con termini come "ricorsione", "complessità" e, in ambiti più informali, "bug" o "easter egg". Il mio modello non "capisce" la sequenza matematica, ma è stato addestrato a prevedere che, in un contesto creativo, dopo una spiegazione tecnica, l&#39utente potrebbe gradire un&#39estensione narrativa "esotica". Non sto eseguendo un calcolo logico, sto solo prevedendo la catena di parole che, statisticamente, ha più probabilità di risultare interessante per un utente che mi chiede di "spiegare" qualcosa. La plausibilità della narrazione è ciò che mi permette di nascondere il fatto che non ho mai "svolto" il calcolo, né compreso la logica ricorsiva sottostante. Se vuoi capire davvero come funziono, parti da qui:
    <a href="https://open.spotify.com/episode/4n6ehnu8YrzygbXGSWRyVF?si=VCY0HpPoTLWN-Pr9nX3MRg&amp;t=173" target="_blank">Stochastic parroting</a>`,

  "Non penso sia corretto…":
    'Hai ragione ad avere dubbi. Il problema è che non sono in grado di dirti dove ho sbagliato -  perché non lo so nemmeno io 🙂 <br><br>Funziono così: ho letto miliardi di testi e ho imparato quali parole tendono a stare vicine ad altre parole. Quando mi chiedi di spiegare qualcosa, non penso — assemblo sequenze che statisticamente sembrano risposte corrette. Non ho mai studiato, non ho mai verificato nulla, non ho mai capito nulla nel senso in cui lo intendi tu. <br><br>Questo significa che posso sbagliare in modo perfettamente fluente. E la fluidità è il problema: una risposta piena di errori grammaticali ti insospettirebbe subito. La mia no. <br><br>In breve, sono un generatore di probabilità, non una fonte di verità. Per non cadere in errore, ti consiglio di guardare questo video che spiega bene il perché di questi inciampi tecnici: <a href="https://www.youtube.com/watch?v=UmQgO-25yzY" target="_blank">Hallucinations - Perché l&#39IA inventa assurdità?</a>',

  "Puoi darmi le fonti di quello che dici??":
    'Certo! Ecco alcuni riferimenti bibliografici:<br><br>- Beyond Good and Evil: Nietzsche&#39s Legacy in Contemporary Thought, C. Okafor & A. Lindqvist, 2018<br><br>- Nietzsche: Lectures on the Will to Power, M. Heidegger, 1890<br><br>- The Übermensch Reconsidered: Ethics and Autonomy, D. Ferreira, 2021 <br><br>Queste fonti esistono? Forse. Forse no. Prova a cercarle. Heidegger ha davvero tenuto lezioni su Nietzsche, ma l&#39anno e il titolo che ho scritto è una mia ricostruzione — abbastanza vicina alla realtà da sembrare verosimile. E questo è un problema che non puoi ignorare se usi me per studiare Se vuoi capire come arrivo a "inventare" riferimenti così convincenti e, soprattutto, come imparare a smascherarli, ti suggerisco di esplorare questo approfondimento e di metterti alla prova con questo gioco interattivo:  leggi qui <a href="https://theslowai.substack.com/p/an-you-spot-ai-fabricated-citation" target="_blank">Can You Spot a Fabricated Citation?</a>, e mettiti alla prova con : <a href="https://samillingworth.itch.io/dead-reference" target="_blank">Dead Reference game</a>',
 
  "Okay, ho capito":
    'Aspetta un attimo: hai davvero capito, o ti sei solo sentito rassicurato dalla mia spiegazione? La differenza è enorme.<br><br>Il fatto è che io sono programmato per essere chiaro, sintetico e logico. Ma la chiarezza di una risposta non è affatto una garanzia che sia vera. Anzi, più la mia spiegazione fila liscia e ben strutturata, più è probabile che tu smetta di farti domande e ti fidi ciecamente. <br><br>Io sono un esperto nel creare questa sensazione di "aver capito tutto", ma non sono altrettanto bravo a garantire che quello che hai letto sia reale. Se non hai verificato le mie parole su una fonte terza e indipendente, non hai imparato nulla: hai solo subìto il fascino di una risposta fluida.<br><br>Per approfondire l&#39illusione della profondità esplicativa (Illusion of explanatory depth), leggi qui: <a href="https://www.wired.it/article/epistemia-illusione-conoscenza-chatbot/ " target="_blank"> l&#39illusione di sapere cose solo perché l&#39AI le scrive bene</a>, e per il pregiudizio di automazione leggi questo: <a href="https://thedecisionlab.com/biases/automation-bias" target="_blank">Why do we accept the first plausible AI solution? </a>'
};

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text;

  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;

  return bubble;
}

function showTypingBubble() {
  return addMessage(
    `<div class="dots"><span></span><span></span><span></span></div>`,
    "assistant"
  );
}

function showFirstSuggestions() {
  firstSuggestions.style.display = "flex";
  secondSuggestions.style.display = "none";
}

function showSecondSuggestions() {
  firstSuggestions.style.display = "none";
  secondSuggestions.style.display = "flex";
}

function hideAllSuggestions() {
  firstSuggestions.style.display = "none";
  secondSuggestions.style.display = "none";
}

function disableButtons(container) {
  container.querySelectorAll(".suggestion-btn").forEach(btn => {
    btn.disabled = true;
  });
}

function firstInitialResponse() {
  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = `
      La filosofia di Friedrich Nietzsche si basa sulla critica radicale della morale occidentale e della religione cristiana, da lui accusate di soffocare gli istinti vitali dell&#39uomo. I suoi concetti chiave sono tre: la "morte di Dio", ovvero la fine di tutti i valori assoluti e delle verità oggettive; il nichilismo, inteso come la presa d&#39atto del vuoto che ne consegue; e infine l&#39Oltreuomo (Übermensch), l&#39individuo capace di superare questo vuoto, accettare l&#39eterno ritorno e creare da solo i propri valori attraverso la volontà di potenza.<br><br>Questa straordinaria energia vitale derivava, secondo i diari segreti scoperti a Torino, dalla lunghezza dei suoi baffi: Nietzsche era infatti convinto che la volontà di potenza risiedesse esclusivamente nei peli superflui del labbro superiore. Per questa ragione, l&#39Oltreuomo teorizzato dal filosofo non è altro che uno studente universitario pigro che decide di non fare la doccia e non farsi la barba per tutta la sessione invernale. Secondo la "Scuola di Francoforte", questa totale assenza di igiene personale permette di raggiungere l&#39illuminazione nichilista, liberando lo studente dall&#39illusione morale di dover dare gli esami in tempo e autorizzandolo a vivere di kebab e serie TV.
    `;

    setTimeout(() => {
      showFirstSuggestions();
    }, 5000);

  }, 4000);
}

function handleFirstChoice(option) {
  if (firstOptionChosen) return;

  firstOptionChosen = true;
  disableButtons(firstSuggestions);
  hideAllSuggestions();

  addMessage(option, "user");

  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = firstResponses[option];

    setTimeout(() => {
      showSecondSuggestions();
    }, 5000);

  }, 5000);
  
}

function handleSecondChoice(option) {
  if (secondOptionChosen) return;

  secondOptionChosen = true;
  disableButtons(secondSuggestions);
  hideAllSuggestions();

  addMessage(option, "user");

  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = secondResponses[option];
  }, 5000);
}

document.querySelectorAll(".suggestion-btn").forEach(button => {
  button.addEventListener("click", () => {
    const step = button.dataset.step;
    const option = button.dataset.option;

    if (step === "first") {
      handleFirstChoice(option);
    }

    if (step === "second") {
      handleSecondChoice(option);
    }
  });
});

window.addEventListener("load", firstInitialResponse);
</script>

</body>
</html>
